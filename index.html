<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marginalia — Organizando Emoções</title>
    <script>
      window.addEventListener("error", (event) => {
        const errorData = {
          type: "uncaught-error",
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          stack: event.error ? event.error.stack : null
        };
        fetch("/api/log-error", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(errorData)
        }).catch(err => console.error("Failed reporting error", err));
      });

      window.addEventListener("unhandledrejection", (event) => {
        const errorData = {
          type: "unhandled-rejection",
          reason: event.reason ? (event.reason.message || String(event.reason)) : "Unknown promise rejection",
          stack: event.reason && event.reason.stack ? event.reason.stack : null
        };
        fetch("/api/log-error", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(errorData)
        }).catch(err => console.error("Failed reporting rejection", err));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

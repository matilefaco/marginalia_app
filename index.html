<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marginalia — Organizando Emoções</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FAF8F3'/%3E%3Cpath d='M38 18v64' stroke='%231C1916' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M38 50h22' stroke='%231C1916' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='74' cy='50' r='5.5' fill='%23C5895A'/%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FAF8F3'/%3E%3Cpath d='M38 18v64' stroke='%231C1916' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M38 50h22' stroke='%231C1916' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='74' cy='50' r='5.5' fill='%23C5895A'/%3E%3C/svg%3E" />
    <script>
      window.addEventListener("error", (event) => {
        const errorData = {
          type: "uncaught-error",
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          stack: event.error ? event.error.stack : null
        };
        fetch("/api/log-error", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(errorData)
        }).catch(err => console.error("Failed reporting error", err));
      });

      window.addEventListener("unhandledrejection", (event) => {
        const errorData = {
          type: "unhandled-rejection",
          reason: event.reason ? (event.reason.message || String(event.reason)) : "Unknown promise rejection",
          stack: event.reason && event.reason.stack ? event.reason.stack : null
        };
        fetch("/api/log-error", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(errorData)
        }).catch(err => console.error("Failed reporting rejection", err));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
